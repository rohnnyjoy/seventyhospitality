<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seventy Hospitality</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #8B9A7B;
      color: #1E1E1E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      width: 120px;
      height: auto;
    }

    .tagline {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #2A2A2A;
    }

    .email {
      margin-top: 1rem;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .email a {
      color: #1E1E1E;
      text-decoration: none;
      border-bottom: 1px solid rgba(30, 30, 30, 0.3);
      padding-bottom: 1px;
      transition: border-color 0.2s;
    }

    .email a:hover {
      border-color: #1E1E1E;
    }
  </style>
</head>
<body>
  <div class="page">
    <svg class="logo" viewBox="0 0 100 108" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="seventy-clip">
          <rect x="0" y="0" width="100" height="105"/>
        </clipPath>
      </defs>
      <circle cx="56" cy="36" r="30" stroke="#1E1E1E" stroke-width="9" fill="none"/>
      <path d="M 8,36 L 56,36 L 20,105" stroke="#1E1E1E" stroke-width="9" stroke-linejoin="miter" stroke-linecap="square" fill="none" clip-path="url(#seventy-clip)"/>
    </svg>
    <div class="tagline">Coming Soon</div>
    <div class="email"><a href="mailto:contact@seventyhospitality.com">contact@seventyhospitality.com</a></div>
  </div>
</body>
</html>
