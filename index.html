<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seventy Hospitality</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #8B9A7B;
      color: #1E1E1E;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      font-size: 7rem;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #1E1E1E;
    }

    .tagline {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #2A2A2A;
    }

    .email {
      margin-top: 1rem;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .email a {
      color: #1E1E1E;
      text-decoration: none;
      border-bottom: 1px solid rgba(30, 30, 30, 0.3);
      padding-bottom: 1px;
      transition: border-color 0.2s;
    }

    .email a:hover {
      border-color: #1E1E1E;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="logo">70</div>
    <div class="tagline">Coming Soon</div>
    <div class="email"><a href="mailto:contact@seventyhospitality.com">contact@seventyhospitality.com</a></div>
  </div>
</body>
</html>
